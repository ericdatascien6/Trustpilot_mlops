version: "3.9"

services:

  api:
    build:
      context: ./services/api
      target: prod
    container_name: trustpilot_api
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/models
      - ./data:/data
      - ./mlruns:/mlruns

  api-tests:
    build:
        context: ./services/api
        target: test
    container_name: trustpilot_api_tests
    depends_on:
      - mlflow
    volumes:
      - ./models:/models
      - ./data:/data
      - ./mlruns:/mlruns


  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    container_name: trustpilot_mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns
    volumes:
      - ./mlruns:/mlruns

  trainer:
    build:
      context: ./services/trainer
    container_name: trustpilot_trainer
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=trustpilot_topic_modeling
      - DATA_PATH=/data/raw/train.csv
      - MODELS_DIR=/models
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - K=6
      - RANDOM_STATE=42
      - SAMPLE_SIZE=20000
    volumes:
      - ./models:/models
      - ./data:/data
      - ./mlruns:/mlruns
