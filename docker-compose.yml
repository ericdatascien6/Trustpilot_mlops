services:
  # =========================
  # 1) API
  # =========================
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: trustpilot_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
      - ./data:/data
    environment:
      - MODEL_DIR=/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # =========================
  # 2) MLFLOW (tracking)
  # =========================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: trustpilot_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:/mlruns
      --default-artifact-root file:/mlruns
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:5000/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped
